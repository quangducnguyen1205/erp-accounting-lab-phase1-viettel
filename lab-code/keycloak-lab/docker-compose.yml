services:
  keycloak-postgres:
    image: postgres:16-alpine
    container_name: viettel-keycloak-postgres
    environment:
      # Local demo database only. Do not reuse these values in production.
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - viettel-keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: viettel-keycloak
    command: start-dev
    environment:
      # Dev-only admin user cho mini-lab local.
      # Không dùng giá trị này cho production.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "18080:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

volumes:
  viettel-keycloak-postgres-data:
