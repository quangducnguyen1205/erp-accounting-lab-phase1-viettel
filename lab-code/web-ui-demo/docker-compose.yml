services:
  web-ui-demo:
    container_name: viettel-web-ui-demo
    build:
      context: .
      target: dev
    ports:
      - "${WEB_UI_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:18080}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-viettel-lab}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-tenant-demo-web}
      VITE_REQUEST_ID_PREFIX: ${VITE_REQUEST_ID_PREFIX:-web-demo}
    labels:
      logging.service: web-ui-demo
      logging.environment: local
