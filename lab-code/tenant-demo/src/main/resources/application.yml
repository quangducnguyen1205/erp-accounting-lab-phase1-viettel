# ==============================================================
# TASK: Cấu hình Spring Boot application
# ==============================================================
#
# File này là cấu hình local tối thiểu kèm ghi chú học tập.
#
# Lưu ý quan trọng:
# - Spring Boot đọc environment variables từ OS/process.
# - Spring Boot KHÔNG tự đọc file `.env` chỉ vì file đó tồn tại.
# - Docker Compose, IDE, terminal hoặc tool như dotenv có thể nạp biến môi
#   trường trước khi chạy app.
# - `.env.example` chỉ là file mẫu để biết cần biến nào.
# - Không hardcode secret thật vào `application.yml`.
#
# Cách đọc placeholder:
#   ${TEN_BIEN:gia_tri_mac_dinh}
#
# Ví dụ `${SERVER_PORT:8080}` nghĩa là:
# - nếu có biến SERVER_PORT thì dùng biến đó;
# - nếu không có thì dùng 8080.
#
# ==============================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tenant-demo

  datasource:
    # Các giá trị mặc định dưới đây khớp với `lab-code/docker/docker-compose.yml`.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:erpdb}
    username: ${DB_USER:erpuser}
    password: ${DB_PASSWORD:erpuser}

  jpa:
    open-in-view: false
    hibernate:
      # Vì schema do Flyway quản lý, KHÔNG để Hibernate tự tạo/cập nhật bảng.
      # Giai đoạn này dùng `validate` để phát hiện entity không khớp schema.
      ddl-auto: validate
    show-sql: false # Dùng logging bên dưới thay vì show-sql để log rõ hơn.
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  flyway:
    enabled: true
    # Flyway mặc định đọc `classpath:db/migration`.
    # locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      repositories:
        enabled: false

logging:
  pattern:
    # requestId đến từ MDC trong RequestLoggingFilter. Với log ngoài HTTP request,
    # giá trị này sẽ là "no-request".
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [requestId=%X{requestId:-no-request}] %logger{36} - %msg%n"
  level:
#    org.hibernate.SQL: debug
    org.flywaydb: info

# ==============================================================
# Observability/Actuator mini-lab
# ==============================================================
#
# Chỉ expose endpoint cần học. Không dùng "*" vì dễ lộ thông tin runtime
# như env/config/beans nếu sau này bật nhầm endpoint nhạy cảm.
#
# Security rule nằm trong SecurityConfig:
# - /actuator/health public để infra kiểm tra app còn sống.
# - /actuator/prometheus public cho Prometheus local scrape trong mini-lab.
# - /actuator/info và /actuator/metrics cần Bearer token.
#
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Public health chỉ thấy status; detail chỉ hiện khi request authorized.
      show-details: when_authorized
  info:
    env:
      # Chỉ bật vì phần info.* bên dưới là metadata explicit, không chứa secret.
      enabled: true
  health:
    redis:
      # Redis/cache là mini-lab optional và mặc định tắt. Nếu để Actuator tự
      # check Redis trong khi Redis không chạy, /actuator/health sẽ DOWN dù
      # app baseline + PostgreSQL vẫn ổn.
      enabled: false

info:
  app:
    name: tenant-demo
    phase: phase-1-learning-lab
    description: Spring Boot tenant-aware backend learning demo

# ==============================================================
# JWT tạm cho Sprint security
# ==============================================================
#
# Đây là JWT tạm cho local lab, KHÔNG phải Keycloak/OIDC production.
# Không hardcode secret thật trong file này. Khi chạy nghiêm túc hơn,
# copy `.env.example` thành `.env` và đổi JWT_SECRET.
#
# JWT_SECRET là secret/private key local để ký/verify token tạm.
# Nó KHÔNG phải password user.
#
app:
  # ==============================================================
  # Auth mode
  # ==============================================================
  #
  # local-jwt: mode hiện tại, dùng JWT tạm HS256 do tenant-demo tạo.
  # keycloak: mode dùng token từ Keycloak local.
  #
  # Lưu ý: keycloak mode chưa bật mặc định vì cần Keycloak local đang chạy.
  # Test tự động hiện vẫn dùng local-jwt để không phụ thuộc container Keycloak.
  auth:
    mode: ${APP_AUTH_MODE:local-jwt}
    keycloak:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:18080/realms/viettel-lab}
      # Client chứa role claim: resource_access.<client-id>.roles
      client-id: ${KEYCLOAK_CLIENT_ID:tenant-demo-api-client}
      # Optional. Thường Spring Security discovery JWKS từ issuer-uri.
      # Chỉ set nếu muốn trỏ thẳng tới endpoint certs/JWKS.
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:}

  jwt:
    secret: ${JWT_SECRET:local-learning-secret-change-me-32-characters-minimum}
    issuer: ${JWT_ISSUER:tenant-demo-local}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    dev-token-enabled: ${JWT_DEV_TOKEN_ENABLED:false}

  # ==============================================================
  # Redis/cache mini-lab
  # ==============================================================
  #
  # Cache tắt mặc định để app/test không phụ thuộc Redis.
  # PostgreSQL vẫn là source of truth; Redis chỉ giữ bản sao tạm.
  # Cache key của dữ liệu tenant-aware phải có tenantId.
  cache:
    enabled: ${APP_CACHE_ENABLED:false}
    master-data-ttl-seconds: ${APP_CACHE_MASTER_DATA_TTL_SECONDS:300}

  # ==============================================================
  # Kafka/async messaging mini-lab
  # ==============================================================
  #
  # Messaging tắt mặc định để app/test không phụ thuộc Kafka.
  # Khi tự code mini-lab, bật APP_MESSAGING_ENABLED=true và chạy
  # lab-code/kafka-lab/docker-compose.yml.
  #
  # PostgreSQL vẫn là source of truth. Kafka chỉ truyền event async
  # như MasterDataChangedEvent; event phải có tenantId.
  messaging:
    enabled: ${APP_MESSAGING_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    master-data-topic: ${KAFKA_MASTER_DATA_TOPIC:master-data-events}
