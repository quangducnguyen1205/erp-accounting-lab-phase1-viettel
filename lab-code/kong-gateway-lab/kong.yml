_format_version: "3.0"
_transform: true

services:
  - name: tenant-demo-api
    url: http://host.docker.internal:8080
    routes:
      - name: tenant-demo-master-data-api
        paths:
          - /api/master-data
        strip_path: false
        preserve_host: false
        protocols:
          - http

  - name: tenant-demo-health
    url: http://host.docker.internal:8080/actuator/health
    routes:
      - name: tenant-demo-health-route
        paths:
          - /tenant-demo/actuator/health
        strip_path: true
        preserve_host: false
        protocols:
          - http

  - name: audit-log-api
    url: http://host.docker.internal:8082
    routes:
      - name: audit-log-events-api
        paths:
          - /api/audit-events
        strip_path: false
        preserve_host: false
        protocols:
          - http

  - name: file-service-api
    url: http://host.docker.internal:8083
    routes:
      - name: file-service-files-api
        paths:
          - /api/files
        strip_path: false
        preserve_host: false
        protocols:
          - http

plugins:
  - name: cors
    route: tenant-demo-master-data-api
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-Id
      exposed_headers:
        - X-Request-Id
      credentials: false
      max_age: 3600

  - name: cors
    route: audit-log-events-api
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-Id
      exposed_headers:
        - X-Request-Id
      credentials: false
      max_age: 3600

  - name: cors
    route: file-service-files-api
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-Id
      exposed_headers:
        - X-Request-Id
        - Content-Disposition
      credentials: false
      max_age: 3600
