services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: viettel-minio
    command: server /data --console-address ":9001"
    environment:
      # Dev-only credentials cho mini-lab local.
      # Không dùng giá trị này cho production.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
